services:
  - type: web
    name: workhub-backend
    runtime: python3
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate"
    startCommand: "cd backend && python manage.py migrate && gunicorn workhub_backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: workhub-backend.onrender.com,workhub-backend-1.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://workhub1.vercel.app